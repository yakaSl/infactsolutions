# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
# See https://firebase.google.com/docs/app-hosting/configure#user-defined-environment
#
# Everything below is read server-side only (server actions, the webhook route,
# email + Firestore helpers), so RUNTIME availability is sufficient.
#
# Secret values live in Cloud Secret Manager, created with:
#   firebase apphosting:secrets:set <NAME>
# The `secret:` field is the Secret Manager secret name (kept identical to the
# variable name here). Never put secret values in this file — it is committed to git.
env:
  # --- Non-sensitive config (safe as plain values) ---
  # PayPal base URL controls sandbox vs. live.
  # Sandbox: https://api-m.sandbox.paypal.com  |  Live: https://api-m.paypal.com
  - variable: PAYPAL_BASE_URL
    value: https://api-m.paypal.com
    availability:
      - RUNTIME
  - variable: ADMIN_NOTIFICATION_EMAIL
    value: m4nuj4y4@gmail.com
    availability:
      - RUNTIME
  - variable: RESEND_FROM
    value: Infact Solutions <noreply@infactsolutions.net>
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_BASE_URL
    value: https://infactsolutions.net
    availability:
      - RUNTIME

  # --- Firebase Web / Analytics (client-side, PUBLIC) ---
  # NEXT_PUBLIC_ vars are inlined into the client JS bundle at BUILD time and are
  # served to every visitor's browser, so they are public by design and MUST NOT
  # be treated as secrets. Firebase Web identifiers (API key, project/app/sender
  # ids, etc.) are not credentials — access is controlled by Firestore Security
  # Rules and (recommended) an HTTP-referrer restriction on the API key in the
  # Google Cloud console, not by keeping these values hidden. Plain `value:` here
  # keeps builds simple and requires BUILD availability so the browser bundle gets
  # them. Analytics only starts once NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID is present.
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyCSdAyrN7qZmulYmKWGJPWp3nPSdiPYIAE
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: infact-solutions.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: infact-solutions
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: infact-solutions.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "620663360414"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:620663360414:web:dfce5066ea2131d010648f
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: G-E6GWY0R1NQ
    availability:
      - BUILD
      - RUNTIME

  # --- Secrets (Cloud Secret Manager) ---
  - variable: PAYPAL_CLIENT_ID
    secret: PAYPAL_CLIENT_ID
    availability:
      - RUNTIME
  - variable: PAYPAL_CLIENT_SECRET
    secret: PAYPAL_CLIENT_SECRET
    availability:
      - RUNTIME
  - variable: PAYPAL_WEBHOOK_ID
    secret: PAYPAL_WEBHOOK_ID
    availability:
      - RUNTIME
  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
    availability:
      - RUNTIME
  - variable: FIREBASE_SERVICE_ACCOUNT_JSON
    secret: FIREBASE_SERVICE_ACCOUNT_JSON
    availability:
      - RUNTIME

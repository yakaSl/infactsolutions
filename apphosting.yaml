# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1

env:
  # Public — visible in client bundles, fine to commit.
  - variable: NEXT_PUBLIC_BASE_URL
    value: https://infactsolutions.net
    availability: [BUILD, RUNTIME]

  # Non-secret runtime config.
  - variable: PAYPAL_BASE_URL
    value: https://api-m.sandbox.paypal.com
    availability: [RUNTIME]
  - variable: ADMIN_NOTIFICATION_EMAIL
    value: hello@infactsolutions.net
    availability: [RUNTIME]

  # Secrets — value lives in Secret Manager, referenced by name.
  # Create each with: firebase apphosting:secrets:set <NAME>
  - variable: PAYPAL_CLIENT_ID
    secret: PAYPAL_CLIENT_ID
  - variable: PAYPAL_CLIENT_SECRET
    secret: PAYPAL_CLIENT_SECRET
  - variable: PAYPAL_WEBHOOK_ID
    secret: PAYPAL_WEBHOOK_ID
  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
  - variable: RESEND_FROM
    secret: RESEND_FROM
  - variable: FIREBASE_SERVICE_ACCOUNT_JSON
    secret: FIREBASE_SERVICE_ACCOUNT_JSON
